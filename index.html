<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バッテリー低下車両マップ (作業員用)</title>
    
    <!-- Leaflet.js CSS (軽量・タッチ操作に最適) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- 外部スタイルシート -->
    <link rel="stylesheet" href="style.css">

    <!-- アイコン設定 -->
    <link rel="icon" href="images/icon-transparent.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="残量マップ">
    <link rel="manifest" href="manifest.json">
    <!-- ver.20260609203200 -->
</head>
<body>

    <div id="app-container">
        <header>
            <div class="header-top">
                <h1 style="display: flex; align-items: center; gap: 8px;">🔋 バッテリー低下車両マップ</h1>
                <div id="update-time" class="update-time">
                    データ取得中...
                    <span class="update-note">数分前の情報が表示されている可能性があります</span>
                </div>
            </div>
            <div class="header-bottom">
                <!-- 作業選択セレクトボックス -->
                <div class="worker-select-container">
                    <label class="worker-select-label" for="worker-select">
                        <span class="worker-select-icon">👤</span>
                        <select id="worker-select" class="worker-select-box">
                            <option value="none">作業選択: 未選択</option>
                            <option value="admin">管理者モード (位置表示)</option>
                        </select>
                    </label>
                </div>
                <!-- ポート選択モードトグルスイッチ -->
                <div class="selection-mode-toggle-container">
                    <label class="selection-toggle-label" for="selection-mode-checkbox">
                        <input type="checkbox" id="selection-mode-checkbox">
                        <span class="selection-toggle-button">
                            <span class="selection-toggle-icon">📌</span>
                            <span class="selection-toggle-text">選択モード OFF</span>
                        </span>
                    </label>
                </div>
                <!-- 交換済表示モードトグルスイッチ -->
                <div class="replaced-mode-toggle-container">
                    <label class="replaced-toggle-label" for="replaced-mode-checkbox">
                        <input type="checkbox" id="replaced-mode-checkbox" checked style="display: none;">
                        <span class="replaced-toggle-button">
                            <span class="replaced-toggle-icon">♻️</span>
                            <span class="replaced-toggle-text">交換済 ON</span>
                        </span>
                    </label>
                </div>
                <!-- ビューの初期状態リセットボタン -->
                <button id="reset-view-btn" class="reset-view-button" title="表示状態（フィルターや地図位置など）を初期状態に戻します">
                    🔄 リセット
                </button>
                <!-- ヘルプボタン -->
                <a href="docs/manual.html" target="_blank" class="help-button" title="使い方マニュアルを開く">❓ ヘルプ</a>
            </div>
        </header>

        <!-- エリア選択タブコンテナ -->
        <div id="area-tabs" class="area-tabs-container"></div>

        <div id="main-content">
            <!-- 地図表示領域 -->
            <div id="map"></div>

            <!-- サマリー情報 -->
            <div id="summary-panel" class="summary-panel" style="display: none;">
                <div class="panel-header-mobile" id="summary-header-mobile" style="cursor: pointer; user-select: none;">
                    <span style="font-weight:bold;">📊 エリア状況サマリー <span class="summary-toggle-arrow">▼</span></span>
                    <button class="close-panel-btn">✕</button>
                </div>
                <!-- 選択されたポート一覧カード表示用コンテナ -->
                <div id="selected-ports-container" class="selected-ports-container" style="display: none;">
                    <div class="selected-ports-title">📌 選択中のポート</div>
                    <div id="selected-ports-list" class="selected-ports-list"></div>
                </div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 4px;">
                    <div>交換対象ポート数: <span id="alert-ports-count" class="count">0</span> 箇所</div>
                    <div style="color: #475569;">/</div>
                    <div>交換必要車両: <span id="alert-bikes-count" class="count">0</span> 台</div>
                </div>
                <div id="highlight-summary-container" class="highlight-summary-container" style="display: none;"></div>
                <div id="summary-table-container"></div>
            </div>

            <!-- 地図上の凡例 (Legend) パネル (タップ可能な大ぶりチェックボックス付き) -->
            <div class="map-legend" id="map-legend-panel">
                <div class="panel-header-mobile">
                    <span style="font-weight:bold;">🔋 バッテリー深刻度凡例</span>
                    <button class="close-panel-btn">✕</button>
                </div>
                <div class="map-legend-title">🔋 バッテリー深刻度凡例 (フィルター)</div>
                <label class="map-legend-item" id="legend-item-level5">
                    <div style="display: flex; align-items: center;">
                        <div class="map-legend-color" style="background-color: #4c1d95;"></div>
                        <span><b>最低</b> (残量 ~20%)</span>
                    </div>
                    <input type="checkbox" class="legend-filter" value="5" checked>
                </label>
                <label class="map-legend-item">
                    <div style="display: flex; align-items: center;">
                        <div class="map-legend-color" style="background-color: #ef4444;"></div>
                        <span><b>低</b> (残量 25~35%)</span>
                    </div>
                    <input type="checkbox" class="legend-filter" value="4" checked>
                </label>
                <label class="map-legend-item">
                    <div style="display: flex; align-items: center;">
                        <div class="map-legend-color" style="background-color: #f97316;"></div>
                        <span><b>中</b> (残量 40~50%)</span>
                    </div>
                    <input type="checkbox" class="legend-filter" value="3">
                </label>
                <label class="map-legend-item">
                    <div style="display: flex; align-items: center;">
                        <div class="map-legend-color" style="background-color: #eab308;"></div>
                        <span><b>高</b> (残量 55~70%)</span>
                    </div>
                    <input type="checkbox" class="legend-filter" value="2">
                </label>
                <label class="map-legend-item">
                    <div style="display: flex; align-items: center;">
                        <div class="map-legend-color" style="background-color: #22c55e;"></div>
                        <span><b>最高</b> (残量 75~100%)</span>
                    </div>
                    <input type="checkbox" class="legend-filter" value="0">
                </label>
                <label class="map-legend-item">
                    <div style="display: flex; align-items: center;">
                        <div class="map-legend-color" style="background-color: #ffffff; border: 2px solid #64748b; color: #ef4444; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; line-height: 1;">0</div>
                        <span><b>自転車0台</b></span>
                    </div>
                    <input type="checkbox" class="legend-filter" value="-1">
                </label>
            </div>

            <!-- 右上のマップコントロール（横並び用コンテナ） -->
            <div class="map-top-right-controls">
                <!-- 右上の車両状態 (Status) フィルターパネル -->
                <div class="status-filter-panel" id="status-filter-panel">
                    <div class="panel-header-mobile">
                        <span style="font-weight:bold;">🚲 車両状態フィルター</span>
                        <button class="close-panel-btn">✕</button>
                    </div>
                    <div class="status-filter-title" id="status-header-btn">
                        <span>🚲 車両状態 (フィルター)</span>
                        <span class="panel-arrow">▼</span>
                    </div>
                    <div class="status-options-container" id="status-options-container">
                        <!-- 未施錠未返却の判定閾値設定とフィルター -->
                        <div style="padding: 8px 12px 0 12px; border-bottom: 1px solid #475569; padding-bottom: 8px; display: flex; flex-direction: column; gap: 6px;">
                            <label style="font-size: 11px; font-weight: bold; color: #cbd5e1; display: flex; align-items: center; justify-content: space-between;">
                                <span>未施錠判定閾値</span>
                                <div style="display: flex; align-items: center; gap: 4px;">
                                    <input type="number" id="unlocked-threshold-input" value="2.0" step="0.5" min="0.1" style="width: 50px; padding: 2px 4px; font-size: 11px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: center; color: #0f172a; background-color: #ffffff;">
                                    <span style="font-weight: normal; color: #cbd5e1;">時間</span>
                                </div>
                            </label>
                            <label class="status-filter-item" style="padding: 4px 0; border: none; margin: 0; cursor: pointer; display: flex; align-items: center; justify-content: space-between;">
                                <div style="display: flex; align-items: center;">
                                    <span id="unlocked-filter-label" style="font-weight: bold; color: #db2777;">🔑 未施錠未返却 (2.0時間以上)</span>
                                </div>
                                <input type="checkbox" id="unlocked-filter-checkbox" value="unlocked" checked>
                            </label>
                        </div>
                        <!-- 一括選択・解除項目 -->
                        <div style="padding: 8px 12px; display: flex; gap: 8px; border-bottom: 1px dashed #475569;">
                            <button type="button" id="status-select-all" style="flex: 1; background-color: #007aff; border: none; color: #ffffff; border-radius: 4px; padding: 8px 0; font-weight: bold; cursor: pointer; font-size: 12px; transition: background-color 0.2s;">すべて選択</button>
                            <button type="button" id="status-deselect-all" style="flex: 1; background-color: #475569; border: none; color: #cbd5e1; border-radius: 4px; padding: 8px 0; font-weight: bold; cursor: pointer; font-size: 12px; transition: background-color 0.2s;">すべて解除</button>
                        </div>
                        <div id="status-checkboxes-container" style="padding-top: 8px;">
                            <!-- JavaScriptで動的生成 -->
                        </div>
                    </div>
                </div>

                <!-- 右上のベースマップ選択パネル -->
                <div class="basemap-panel" id="basemap-panel">
                    <div class="panel-header-mobile">
                        <span style="font-weight:bold;">🗺️ 地図の切り替え</span>
                        <button class="close-panel-btn">✕</button>
                    </div>
                    <div class="basemap-title" id="basemap-header-btn">
                        <span>🗺️ 地図の切り替え</span>
                        <span class="panel-arrow">▼</span>
                    </div>
                    <div class="basemap-options-container" id="basemap-options-container">
                        <div class="basemap-options">
                            <label class="basemap-item">
                                <input type="radio" name="basemap-select" value="googleRoad" autocomplete="off" checked>
                                <span>Google マップ (道路)</span>
                            </label>
                            <label class="basemap-item">
                                <input type="radio" name="basemap-select" value="googleSatellite" autocomplete="off">
                                <span>Google マップ (衛星画像)</span>
                            </label>
                            <label class="basemap-item">
                                <input type="radio" name="basemap-select" value="gsiStd" autocomplete="off">
                                <span>地理院地図 (標準)</span>
                            </label>
                            <label class="basemap-item">
                                <input type="radio" name="basemap-select" value="gsiPale" autocomplete="off">
                                <span>地理院地図 (淡色)</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- モバイル専用：フローティングメニューボタン (画面をすっきりさせるため) -->
            <div id="mobile-control-bar" class="mobile-only-controls">
                <button class="mobile-toggle-btn btn-summary">
                    📊 サマリー
                </button>
                <button class="mobile-toggle-btn btn-legend">
                    🔋 バッテリー
                </button>
                <button class="mobile-toggle-btn btn-status">
                    🚲 車両状態
                </button>
                <button class="mobile-toggle-btn btn-basemap">
                    🗺️ 地図
                </button>
            </div>

            <!-- GPSボタン -->
            <button id="gps-btn" class="gps-button" title="現在地を表示">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.54-7.49-7.49H7v-2h-.59C6.9 6.49 9.95 3.44 13.9 2.95V3h2v-.05c3.95.49 7 3.54 7.49 7.49H21v2h.59c-.49 3.95-3.54 7-7.49 7.49V19h-2v.93zM12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/>
                </svg>
                <span>現在地</span>
            </button>

            <!-- ローディング画面 -->
            <div id="loader">
                <div class="spinner"></div>
                <div style="font-size: 16px; font-weight: bold; color: #475569;">最新データを読み込み中...</div>
            </div>

            <!-- エラー画面 -->
            <div id="error-screen">
                <h2 style="margin-top:0;">データの読み込みに失敗しました</h2>
                <p>dashboard_data.json が見つからないか、データが壊れています。</p>
                <p style="font-size: 14px;">※スクレイピングを実行してデータを生成してください。</p>
            </div>
        </div>
    </div>

    <!-- Leaflet.js Javascript (軽量地図モジュール) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- セキュリティ制限(CORS)回避用のローカルデータ読み込みタグ (ダブルクリックで開く用) -->
    <script src="output/dashboard_data.js"></script>
    <script src="dashboard_data.js"></script>

    <!-- 外部スクリプト -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/map.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/worker.js"></script>
    <script src="main.js"></script>
    <script>
        // スマホ画面のパネル制御ボタンのハンドラー設定（グローバル関数のためHTML側にインライン配置）
        document.addEventListener("DOMContentLoaded", function() {
            const btnSummary = document.querySelector('.btn-summary');
            if (btnSummary) btnSummary.addEventListener('click', toggleSummaryMobile);

            const btnLegend = document.querySelector('.btn-legend');
            if (btnLegend) btnLegend.addEventListener('click', toggleLegendMobile);

            const btnStatus = document.querySelector('.btn-status');
            if (btnStatus) btnStatus.addEventListener('click', toggleStatusMobile);

            const btnBaseMap = document.querySelector('.btn-basemap');
            if (btnBaseMap) btnBaseMap.addEventListener('click', toggleBaseMapMobile);

            // すべてのドロワーの「閉じる」ボタンイベント設定
            document.querySelectorAll('.close-panel-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const drawer = btn.closest('.show-mobile-drawer');
                    if (drawer) drawer.classList.remove('show-mobile-drawer');
                });
            });
        });
    </script>
</body>
</html>
