<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シェアサイクル ポート利用状況</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/public_map.css">
</head>
<body class="public-map-body">

    <!-- パラメータ未指定時の未認証・セキュリティ警告画面 -->
    <div id="no-params-screen" class="public-notice-screen" style="display: none;">
        <div class="notice-card">
            <div class="notice-icon">🔒</div>
            <h2 id="notice-title">エリアが指定されていません</h2>
            <p id="notice-desc">マップを表示するには URL パラメータ（例: <code>?area=KNZ</code>）を指定してください。</p>
        </div>
    </div>

    <!-- マップ画面 -->
    <div id="public-app-container">
        <!-- マップ本体 -->
        <div id="map"></div>

        <!-- マップ上部オーバーレイヘッダー -->
        <div class="public-header-overlay">
            <div class="public-brand">
                <span class="brand-badge">LIVE</span>
                <span class="brand-title" id="app-title-text">ポート利用状況</span>
            </div>
            
            <div class="public-controls">
                <!-- 検索ボックス -->
                <div class="public-search-wrapper">
                    <input type="text" id="public-search-input" placeholder="ポート名を検索..." autocomplete="off">
                    <button id="public-search-clear" class="search-clear-btn" style="display: none;">✕</button>
                </div>
                
                <!-- 日英言語切替ボタン -->
                <button id="lang-toggle-btn" class="lang-btn" title="Language Switch">
                    <span class="lang-label active" data-lang="ja">JP</span>
                    <span class="lang-divider">/</span>
                    <span class="lang-label" data-lang="en">EN</span>
                </button>
            </div>
        </div>

        <!-- マップ下部ステータスバー -->
        <div class="public-footer-overlay">
            <div id="area-badge" class="area-tag-badge">--</div>
            <div id="update-time-display" class="update-time-tag">更新日時: --</div>
        </div>
    </div>

    <!-- 開発環境・ローカル静的動作のフォールバック用 JS データ読み込み -->
    <script src="public_ports.js" onerror="console.log('Static public_ports.js not found, fetching dynamic JSON.')"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- Public Map Logic -->
    <script src="js/public_map.js"></script>
</body>
</html>
