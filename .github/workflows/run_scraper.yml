name: DBS Scraper Auto Run

on:
  schedule:
    # 毎時0分（1時間に1回）自動実行するスケジュール
    - cron: '0 * * * *'
  workflow_dispatch: # 手動起動用

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Node.js 24に対応した最新版にアップグレード

    - name: Set up Python
      uses: actions/setup-python@v5 # Node.js 24に対応した最新版にアップグレード
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper and Upload to OneDrive
      env:
        # プログラムが要求する正しい変数名(DBS_WORKER_*)に、Secretsからマッピングして注入します
        DBS_WORKER_TOP_PAGE: ${{ secrets.ENTPOS_URL }}
        DBS_WORKER_ACCOUNT: ${{ secrets.ENTPOS_USER }}
        DBS_WORKER_PASSWORD: ${{ secrets.ENTPOS_PASSWORD }}
        
        # OneDrive用
        ONEDRIVE_SHARE_URL: ${{ secrets.ONEDRIVE_SHARE_URL }}
        ONEDRIVE_PASSWORD: ${{ secrets.ONEDRIVE_PASSWORD }}
        
        # 事業者用モードの変数もマッピングしておきます
        DBS_ADMIN_TOP_PAGE: ${{ secrets.ENTSYS_URL }}
        DBS_ADMIN_ACCOUNT: ${{ secrets.ENTSYS_USER }}
        DBS_ADMIN_PASSWORD: ${{ secrets.ENTSYS_PASSWORD }}
        
        PYTHONIOENCODING: "utf-8"
      run: |
        # 引数なしでシンプルに起動します
        python main.py
