name: DBS Scraper Auto Run

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # 毎時0分（1時間に1回）自動実行するスケジュール
    - cron: '*/15 * * * *'
  workflow_dispatch: # 手動起動用

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper and Upload to OneDrive
      env:
        # クラウドの画面なしサーバーで動かすための必須設定
        HEADLESS: "True"
        
        # .env と全く同じ名前で金庫(Secrets)から引き出してプログラムに渡します
        DBS_WORKER_TOP_PAGE: ${{ secrets.DBS_WORKER_TOP_PAGE }}
        DBS_WORKER_ACCOUNT: ${{ secrets.DBS_WORKER_ACCOUNT }}
        DBS_WORKER_PASSWORD: ${{ secrets.DBS_WORKER_PASSWORD }}
        
        # OneDrive用
        ONEDRIVE_SHARED_LINK: ${{ secrets.ONEDRIVE_SHARED_LINK }}
        ONEDRIVE_PASSWORD: ${{ secrets.ONEDRIVE_PASSWORD }}
        
        # 事業者用モードの変数 (必要に応じて)
        DBS_TOP_PAGE: ${{ secrets.DBS_TOP_PAGE }}
        DBS_ACCOUNT: ${{ secrets.DBS_ACCOUNT }}
        DBS_PASSWORD: ${{ secrets.DBS_PASSWORD }}
        
        # 動作モード制御用変数 (MAP_DATA_ONLY 等の指定が可能)
        DBS_RUN_MODE: ${{ secrets.DBS_RUN_MODE }}
        
        PYTHONIOENCODING: "utf-8"
      run: |
        python main.py

    - name: Deploy to GitHub Pages (Commit and push latest dashboard data)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # Force add ignored files (dashboard_data.json is gitignored but we want to publish it)
        git add -f dashboard_data.json dashboard_data.js || true
        git commit -m "Auto-update map dashboard data [skip ci]" || true
        git push origin master || true
